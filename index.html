<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="巴黎換匯">
<meta name="theme-color" content="#7B5EA7">
<title>✈️ 巴黎換匯計算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7B5EA7;
  --purple-light: #9B7EC8;
  --purple-pale: #F0EBFA;
  --purple-dark: #4A3270;
  --green: #2A9D6E;
  --green-light: #4DBF8E;
  --green-pale: #E6F7F1;
  --green-dark: #1A6B49;
  --coral: #E05A3A;
  --coral-pale: #FDF0EC;
  --amber: #C07820;
  --amber-pale: #FEF4E0;
  --pink: #C94E7E;
  --pink-pale: #FCE8F1;
  --bg: #F7F4FD;
  --card: #FFFFFF;
  --text: #1A1530;
  --text-muted: #7A6D8A;
  --text-hint: #AFA5BF;
  --border: rgba(123,94,167,0.15);
  --shadow: 0 4px 24px rgba(123,94,167,0.12);
  --radius: 18px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Decorative background */
body::before {
  content: '';
  position: fixed;
  top: -120px; right: -80px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(123,94,167,0.15) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -80px; left: -60px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(42,157,110,0.12) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  padding: 16px 14px 32px;
  position: relative; z-index: 1;
}

/* ── HEADER ── */
.hdr {
  border-radius: 24px;
  padding: 20px 20px 16px;
  margin-bottom: 12px;
  background: linear-gradient(145deg, var(--purple-dark) 0%, var(--purple) 45%, #C4559C 100%);
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hdr::before {
  content: '🗼';
  position: absolute;
  right: 16px; top: 12px;
  font-size: 52px;
  opacity: 0.18;
  line-height: 1;
}
.hdr-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 12px;
}
.hdr-title span { font-size: 20px; margin-right: 6px; }

.rate-area { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.rate-card {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 14px;
  padding: 8px 14px;
  display: flex; align-items: center; gap: 10px;
}
.rate-label { font-size: 12px; opacity: 0.85; line-height: 1.4; }
.rate-controls { display: flex; flex-direction: column; gap: 3px; }
.rate-adj {
  background: rgba(255,255,255,0.25);
  border: none; border-radius: 6px;
  color: #fff; font-size: 13px;
  width: 28px; height: 22px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: 'Outfit', sans-serif;
}
.rate-adj:active { background: rgba(255,255,255,0.45); }
.rate-number {
  font-family: 'Space Mono', monospace;
  font-size: 26px; font-weight: 700;
  min-width: 68px; text-align: center;
  letter-spacing: -1px;
}
.rate-unit { font-size: 11px; opacity: 0.8; line-height: 1.4; }

.edit-btn {
  background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 10px;
  color: #fff;
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  padding: 7px 14px;
  cursor: pointer;
}
.edit-btn:active { background: rgba(255,255,255,0.35); }

.rate-date { font-size: 11px; opacity: 0.7; margin-top: 8px; }

/* ── MODE TOGGLE ── */
.mode-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.mode-btn {
  padding: 12px 6px;
  border-radius: 14px;
  border: 2px solid;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: -0.2px;
}
.mode-btn.twd {
  border-color: var(--purple-light);
  color: var(--purple-dark);
  background: var(--purple-pale);
}
.mode-btn.eur {
  border-color: var(--green-light);
  color: var(--green-dark);
  background: var(--green-pale);
}
.mode-btn.active.twd { background: var(--purple); color: #fff; border-color: var(--purple); }
.mode-btn.active.eur  { background: var(--green); color: #fff; border-color: var(--green); }

/* ── DISPLAY ── */
.disp-box {
  background: var(--card);
  border: 2px solid rgba(123,94,167,0.2);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.expr-line {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--text-hint);
  min-height: 20px;
  text-align: right;
  word-break: break-all;
  margin-bottom: 2px;
}
.main-num {
  font-family: 'Space Mono', monospace;
  font-size: 42px;
  font-weight: 700;
  text-align: right;
  color: var(--text);
  min-height: 52px;
  word-break: break-all;
  line-height: 1.15;
  letter-spacing: -1px;
}
.result-sep {
  border-top: 1.5px dashed rgba(123,94,167,0.18);
  margin-top: 10px;
  padding-top: 10px;
}
.result-label { font-size: 12px; color: var(--text-hint); margin-bottom: 3px; font-weight: 500; }
.result-big {
  font-family: 'Space Mono', monospace;
  font-size: 32px; font-weight: 700;
  letter-spacing: -1px;
}
.result-big.eur-col { color: var(--green); }
.result-big.twd-col { color: var(--purple); }
.result-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

/* ── KEYPAD ── */
.keypad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.k {
  height: 70px;
  border-radius: 16px;
  font-size: 26px;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  border: none;
  cursor: pointer;
  transition: transform 0.08s, filter 0.08s;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
  letter-spacing: -0.5px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.k:active { transform: scale(0.9); filter: brightness(0.88); }
.k.num  { background: var(--purple-pale); color: var(--purple-dark); }
.k.op   { background: var(--amber-pale); color: var(--amber); font-size: 28px; }
.k.eq   { background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; font-size: 30px; }
.k.ac   { background: var(--coral-pale); color: var(--coral); font-size: 20px; font-weight: 700; }
.k.bk   { background: var(--pink-pale); color: var(--pink); font-size: 24px; }
.k.zero { grid-column: span 2; }

/* ── RECORD BUTTON ── */
.rec-btn {
  width: 100%; height: 58px;
  border-radius: 16px; border: none;
  background: linear-gradient(90deg, var(--green), #2A8ABF);
  color: #fff;
  font-size: 18px; font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  margin-bottom: 8px;
  touch-action: manipulation;
  box-shadow: 0 3px 16px rgba(42,157,110,0.3);
  letter-spacing: -0.2px;
}
.rec-btn:active { filter: brightness(0.88); }

/* ── NOTE ── */
.note-wrap { margin-bottom: 12px; }
.note-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
.note-wrap textarea {
  width: 100%;
  border-radius: var(--radius-sm);
  border: 1.5px solid rgba(123,94,167,0.25);
  padding: 11px 14px;
  font-size: 16px;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  background: var(--card);
  resize: none;
  height: 56px;
  outline: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.note-wrap textarea:focus { border-color: var(--purple-light); }
.note-wrap textarea::placeholder { color: var(--text-hint); }

/* ── RECORDS ── */
.rec-hdr {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}
.badge {
  background: var(--pink);
  color: #fff;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 13px;
  font-weight: 600;
}
.clr-btn {
  margin-left: auto;
  background: none; border: none;
  color: #F09595; font-size: 13px;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  font-weight: 500;
}

.rec-item {
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 14px 16px;
  margin-bottom: 9px;
  box-shadow: 0 2px 12px rgba(123,94,167,0.07);
}
.rec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.rec-time { font-size: 11px; color: var(--text-hint); font-weight: 500; }
.del-btn { background: none; border: none; color: #F09595; font-size: 17px; cursor: pointer; padding: 0 4px; }
.rec-amounts { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.ra-twd { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--purple); letter-spacing: -0.5px; }
.ra-arr { font-size: 16px; color: var(--text-hint); }
.ra-eur { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--green); letter-spacing: -0.5px; }
.rec-expr { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-hint); margin-top: 4px; }
.rec-rate { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
.rec-note { font-size: 14px; color: var(--coral); margin-top: 7px; padding-top: 7px; border-top: 1px dashed rgba(224,90,58,0.2); font-weight: 500; }

.empty { text-align: center; color: var(--text-hint); font-size: 15px; padding: 28px 0; font-weight: 500; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,21,48,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--card);
  border-radius: 24px;
  padding: 24px 22px;
  width: 320px;
  box-shadow: 0 24px 60px rgba(26,21,48,0.25);
}
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.modal-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
.modal input {
  width: 100%;
  font-family: 'Space Mono', monospace;
  font-size: 32px; font-weight: 700;
  border: 2px solid rgba(123,94,167,0.3);
  border-radius: 14px;
  padding: 12px 16px;
  text-align: center;
  color: var(--text);
  background: var(--bg);
  outline: none;
  letter-spacing: -1px;
}
.modal input:focus { border-color: var(--purple); }
.modal-sub { font-size: 12px; color: var(--text-hint); text-align: center; margin: 8px 0 14px; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mbtn {
  padding: 13px;
  border-radius: 13px; border: none;
  font-size: 16px; font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
}
.mbtn.cancel { background: var(--bg); color: var(--text-muted); }
.mbtn.ok     { background: var(--purple); color: #fff; }

/* ── INSTALL HINT (iOS) ── */
.install-hint {
  background: linear-gradient(135deg, var(--purple-pale), var(--green-pale));
  border: 1.5px solid rgba(123,94,167,0.2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--purple-dark);
  line-height: 1.6;
  display: flex; align-items: flex-start; gap: 8px;
}
.install-hint .icon { font-size: 20px; flex-shrink: 0; }
.install-hint b { font-weight: 700; }
.install-close {
  margin-left: auto; background: none; border: none;
  color: var(--text-hint); font-size: 18px; cursor: pointer;
  flex-shrink: 0; padding: 0 0 0 6px;
}
</style>
</head>
<body>
<div class="app">

  <!-- Install hint -->
  <div class="install-hint" id="installHint">
    <span class="icon">📲</span>
    <div><b>加到主畫面：</b>Safari 點下方「分享」→「加入主畫面」，像 App 一樣使用！</div>
    <button class="install-close" onclick="dismissHint()">×</button>
  </div>

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title"><span>✈️</span>巴黎換匯計算器</div>
    <div class="rate-area">
      <div class="rate-card">
        <div class="rate-label">台銀<br>現金賣出</div>
        <div class="rate-controls">
          <button class="rate-adj" onclick="adjustRate(0.01)" aria-label="增加">▲</button>
          <button class="rate-adj" onclick="adjustRate(-0.01)" aria-label="減少">▼</button>
        </div>
        <div class="rate-number" id="rateVal">37.65</div>
        <div class="rate-unit">TWD<br>/EUR</div>
      </div>
      <button class="edit-btn" onclick="openModal()">✏️ 手動修改</button>
    </div>
    <div class="rate-date" id="rateDate">請至 rate.bot.com.tw 查詢歐元現金賣出匯率後更新</div>
  </div>

  <!-- Mode toggle -->
  <div class="mode-row">
    <button class="mode-btn twd active" id="btnTwd" onclick="setMode('twd')">💜 輸入台幣</button>
    <button class="mode-btn eur"         id="btnEur" onclick="setMode('eur')">💚 輸入歐元</button>
  </div>

  <!-- Display -->
  <div class="disp-box">
    <div class="expr-line" id="exprLine"></div>
    <div class="main-num" id="mainNum">0</div>
    <div class="result-sep">
      <div class="result-label" id="resLabel">換算結果</div>
      <div class="result-big eur-col" id="resBig">—</div>
      <div class="result-sub" id="resSub"></div>
    </div>
  </div>

  <!-- Keypad -->
  <div class="keypad">
    <button class="k ac" onclick="clearAll()">AC</button>
    <button class="k bk" onclick="backspace()">⌫</button>
    <button class="k op" onclick="inputOp('%')">%</button>
    <button class="k op" onclick="inputOp('÷')">÷</button>
    <button class="k num" onclick="inputNum('7')">7</button>
    <button class="k num" onclick="inputNum('8')">8</button>
    <button class="k num" onclick="inputNum('9')">9</button>
    <button class="k op"  onclick="inputOp('×')">×</button>
    <button class="k num" onclick="inputNum('4')">4</button>
    <button class="k num" onclick="inputNum('5')">5</button>
    <button class="k num" onclick="inputNum('6')">6</button>
    <button class="k op"  onclick="inputOp('−')">−</button>
    <button class="k num" onclick="inputNum('1')">1</button>
    <button class="k num" onclick="inputNum('2')">2</button>
    <button class="k num" onclick="inputNum('3')">3</button>
    <button class="k op"  onclick="inputOp('+')">+</button>
    <button class="k num zero" onclick="inputNum('0')">0</button>
    <button class="k num" onclick="inputDot()">.</button>
    <button class="k eq"  onclick="calculate()">=</button>
  </div>

  <button class="rec-btn" onclick="addRecord()">📝 記錄這筆換匯</button>

  <!-- Note -->
  <div class="note-wrap">
    <div class="note-label">📌 備注</div>
    <textarea id="noteInput" placeholder="餐廳、機票、購物…"></textarea>
  </div>

  <!-- Records -->
  <div>
    <div class="rec-hdr">
      換匯記錄 <span class="badge" id="recCount">0</span>
      <button class="clr-btn" onclick="clearRecords()">清除全部</button>
    </div>
    <div id="recList"><div class="empty">還沒有記錄，出發吧 🗼</div></div>
  </div>

</div>

<!-- Rate modal -->
<div class="modal-overlay" id="rateModal" style="display:none">
  <div class="modal">
    <h3>更新台銀現金賣出匯率</h3>
    <div class="modal-hint">請至 <b>rate.bot.com.tw</b> 查詢「歐元」欄位的「現金賣出」數字</div>
    <input type="number" id="rateInput" step="0.01" min="30" max="50" inputmode="decimal">
    <div class="modal-sub">合理範圍約 33 ~ 42 TWD/EUR</div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">取消</button>
      <button class="mbtn ok"     onclick="confirmRate()">確認更新</button>
    </div>
  </div>
</div>

<script>
let rate = 37.65;
let inputStr = '';
let expression = '';
let mode = 'twd';
let records = [];
let lastCalcResult = null;
let lastExpression = '';
let hasResult = false;
let rateUpdated = false;

// Load saved data
try { const sr = localStorage.getItem('paris_rate'); if (sr) { rate = parseFloat(sr); rateUpdated = true; } } catch(e){}
try { records = JSON.parse(localStorage.getItem('paris_records') || '[]'); } catch(e){}
try { if (localStorage.getItem('paris_hint_dismissed')) document.getElementById('installHint').style.display = 'none'; } catch(e){}

document.getElementById('rateVal').textContent = rate.toFixed(2);
if (rateUpdated) {
  try {
    const rd = localStorage.getItem('paris_rate_date');
    if (rd) document.getElementById('rateDate').textContent = '匯率更新於 ' + rd;
  } catch(e){}
}

function dismissHint() {
  document.getElementById('installHint').style.display = 'none';
  try { localStorage.setItem('paris_hint_dismissed', '1'); } catch(e){}
}

function adjustRate(delta) {
  rate = Math.round((rate + delta) * 100) / 100;
  document.getElementById('rateVal').textContent = rate.toFixed(2);
  saveRate(); updateResult();
}
function openModal() {
  document.getElementById('rateInput').value = rate.toFixed(2);
  document.getElementById('rateModal').style.display = 'flex';
  setTimeout(() => document.getElementById('rateInput').focus(), 100);
}
function closeModal() { document.getElementById('rateModal').style.display = 'none'; }
function confirmRate() {
  const v = parseFloat(document.getElementById('rateInput').value);
  if (v >= 30 && v <= 50) {
    rate = Math.round(v * 100) / 100;
    document.getElementById('rateVal').textContent = rate.toFixed(2);
    const now = new Date();
    const ds = now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    document.getElementById('rateDate').textContent = '匯率更新於 ' + ds;
    saveRate(ds); updateResult();
  }
  closeModal();
}
function saveRate(ds) {
  try { localStorage.setItem('paris_rate', rate); if (ds) localStorage.setItem('paris_rate_date', ds); } catch(e){}
}

function setMode(m) {
  mode = m;
  document.getElementById('btnTwd').classList.toggle('active', m === 'twd');
  document.getElementById('btnEur').classList.toggle('active', m === 'eur');
  document.getElementById('resBig').className = 'result-big ' + (m === 'twd' ? 'eur-col' : 'twd-col');
  updateResult();
}

function updateDisplay() {
  document.getElementById('mainNum').textContent = inputStr || '0';
  document.getElementById('exprLine').textContent = expression;
  updateResult();
}

function updateResult() {
  let val = parseFloat(inputStr);
  if (isNaN(val) || val === 0) val = lastCalcResult || 0;
  if (!val) { document.getElementById('resBig').textContent = '—'; document.getElementById('resSub').textContent = ''; return; }
  if (mode === 'twd') {
    const eur = val / rate;
    document.getElementById('resLabel').textContent = '換算歐元';
    document.getElementById('resBig').textContent = '€ ' + eur.toFixed(2);
    document.getElementById('resSub').textContent = val.toLocaleString() + ' TWD';
  } else {
    const twd = val * rate;
    document.getElementById('resLabel').textContent = '換算台幣';
    document.getElementById('resBig').textContent = 'NT$ ' + Math.round(twd).toLocaleString();
    document.getElementById('resSub').textContent = val.toFixed(2) + ' EUR';
  }
}

function inputNum(n) {
  if (hasResult) { inputStr = ''; expression = ''; hasResult = false; }
  if (inputStr === '0' && n !== '.') inputStr = '';
  if (inputStr.length > 12) return;
  inputStr += n;
  updateDisplay();
}
function inputDot() {
  if (hasResult) { inputStr = '0'; expression = ''; hasResult = false; }
  if (!inputStr.includes('.')) inputStr = (inputStr || '0') + '.';
  updateDisplay();
}
function inputOp(op) {
  if (inputStr === '' && expression === '') return;
  if (inputStr !== '') { expression += inputStr + ' ' + op + ' '; lastCalcResult = parseFloat(inputStr); inputStr = ''; }
  else if (expression !== '') { expression = expression.trimEnd().replace(/[+\-×÷%]\s*$/, op + ' '); }
  hasResult = false; updateDisplay();
}
function calculate() {
  const full = expression + inputStr;
  if (!full.trim()) return;
  try {
    const js = full.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/%/g,'/100');
    const result = Function('"use strict";return(' + js + ')')();
    if (!isFinite(result)) { document.getElementById('mainNum').textContent = '錯誤'; return; }
    lastExpression = full;
    lastCalcResult = Math.round(result * 100) / 100;
    expression = full + ' =';
    inputStr = String(lastCalcResult);
    hasResult = true;
    updateDisplay();
  } catch(e) { document.getElementById('mainNum').textContent = '錯誤'; }
}
function clearAll() { inputStr = ''; expression = ''; hasResult = false; lastCalcResult = null; lastExpression = ''; updateDisplay(); }
function backspace() {
  if (hasResult) { clearAll(); return; }
  if (inputStr.length > 0) { inputStr = inputStr.slice(0, -1); }
  else if (expression.length > 0) {
    const p = expression.trimEnd().split(' '); p.pop();
    inputStr = p.pop() || ''; expression = p.join(' ') + (p.length ? ' ' : '');
  }
  updateDisplay();
}

function addRecord() {
  let val = parseFloat(inputStr) || lastCalcResult;
  if (!val || val <= 0) { alert('請先輸入金額'); return; }
  const note = document.getElementById('noteInput').value.trim();
  const now = new Date();
  const t = now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  let twdAmt, eurAmt;
  if (mode === 'twd') { twdAmt = val; eurAmt = val / rate; }
  else { eurAmt = val; twdAmt = val * rate; }
  records.unshift({ time: t, twd: Math.round(twdAmt), eur: Math.round(eurAmt * 100) / 100, expr: (hasResult && lastExpression) ? lastExpression : '', note, rate });
  try { localStorage.setItem('paris_records', JSON.stringify(records)); } catch(e){}
  document.getElementById('noteInput').value = '';
  renderRecords(); clearAll();
}
function delRec(i) { records.splice(i, 1); try { localStorage.setItem('paris_records', JSON.stringify(records)); } catch(e){} renderRecords(); }
function clearRecords() {
  if (!records.length) return;
  if (confirm('確定清除所有換匯記錄？')) { records = []; try { localStorage.setItem('paris_records', JSON.stringify([])); } catch(e){} renderRecords(); }
}
function renderRecords() {
  const el = document.getElementById('recList');
  document.getElementById('recCount').textContent = records.length;
  if (!records.length) { el.innerHTML = '<div class="empty">還沒有記錄，出發吧 🗼</div>'; return; }
  el.innerHTML = records.map((r, i) => `
    <div class="rec-item">
      <div class="rec-top">
        <span class="rec-time">🕐 ${r.time}</span>
        <button class="del-btn" onclick="delRec(${i})">✕</button>
      </div>
      <div class="rec-amounts">
        <span class="ra-twd">NT$${r.twd.toLocaleString()}</span>
        <span class="ra-arr">→</span>
        <span class="ra-eur">€${r.eur.toFixed(2)}</span>
      </div>
      ${r.expr ? `<div class="rec-expr">算式：${r.expr}</div>` : ''}
      <div class="rec-rate">匯率 ${r.rate} TWD/EUR</div>
      ${r.note ? `<div class="rec-note">📌 ${r.note}</div>` : ''}
    </div>`).join('');
}

renderRecords();
updateResult();
</script>
